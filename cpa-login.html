<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q289QTZ71B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-Q289QTZ71B');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Login - CanadaAccountants</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/phronisi-tokens.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tailwind-utilities.css">
    <style>
        .nav-toggle { display: none; background: none; border: none; color: var(--text-2); font-size: 1.5rem; cursor: pointer; padding: 4px; }
        .login-nav-links.active { display: flex !important; }
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .login-nav-links {
                display: none !important;
                position: absolute; top: 100%; left: 0; right: 0;
                flex-direction: column; align-items: center; gap: 0;
                background: var(--bg-raised); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                padding: 12px 0; border-bottom: 1px solid var(--border);
            }
            .login-nav-links.active { display: flex !important; }
            .login-nav-links a { display: block; padding: 14px 24px; text-align: center; font-size: 15px; width: 100%; }
            .login-nav-links a:hover { background: var(--bg-high); }
        }
    </style>

<style id="phronisi-type">body{font-family:var(--font-body)}</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen mode-light">
    <nav class="bg-white shadow-sm border-b" style="position: relative;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <a href="/" class="font-bold text-xl text-gray-900">CanadaAccountants<span class="text-blue-600">.app</span></a>
                <button class="nav-toggle" onclick="document.querySelector('.login-nav-links').classList.toggle('active')" aria-label="Menu"><svg class="ph-ic" width="1.4em" height="1.4em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true" style="display:inline-block;vertical-align:-0.2em"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg></button>
                <div class="login-nav-links flex items-center space-x-4">
                    <a href="/" class="text-gray-700 hover:text-indigo-600 text-sm font-medium">Home</a>
                    <a href="/forgot-password" class="text-gray-700 hover:text-indigo-600 text-sm font-medium">Forgot Password</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Logo and Header -->
            <div class="text-center">
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                    CPA Dashboard Login
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    Access your CanadaAccountants member dashboard
                </p>
            </div>

            <!-- Login Form -->
            <form class="mt-8 space-y-6" id="loginForm">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="email" class="sr-only">Email address</label>
                        <input 
                            id="email" 
                            name="email" 
                            type="email" 
                            required 
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                            placeholder="Email address"
                        >
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input 
                            id="password" 
                            name="password" 
                            type="password" 
                            required 
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                            placeholder="Password"
                        >
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input 
                            id="remember-me" 
                            name="remember-me" 
                            type="checkbox" 
                            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                        >
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="/forgot-password" class="font-medium text-indigo-600 hover:text-indigo-500">
                            Forgot your password?
                        </a>
                    </div>
                </div>

                <div>
                    <button 
                        type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50"
                        id="loginBtn"
                    >
                        Sign in to Dashboard
                    </button>
                </div>

                <!-- Error Display -->
                <div id="errorMessage" class="hidden mt-3 text-center text-sm text-red-600 bg-red-50 border border-red-200 rounded-md p-3">
                </div>

                <!-- Success Display -->
                <div id="successMessage" class="hidden mt-3 text-center text-sm text-green-600 bg-green-50 border border-green-200 rounded-md p-3">
                </div>
            </form>

            <!-- Registration Link -->
            <div class="text-center">
                <p class="mt-2 text-sm text-gray-600">
                    Don't have an account? 
                    <a href="/join-as-cpa" class="font-medium text-indigo-600 hover:text-indigo-500">
                        Join as a CPA
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Reset messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('https://canadaaccountants-backend-production-1d8f.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store JWT token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Route based on user type
                    const isAdmin = data.user.userType === 'admin';
                    const destination = isAdmin ? '/admin-dashboard' : '/cpa-dashboard';

                    // Show success message
                    successMessage.textContent = `Login successful! Redirecting to ${isAdmin ? 'admin' : ''} dashboard...`;
                    successMessage.classList.remove('hidden');

                    // Redirect to appropriate dashboard
                    setTimeout(() => {
                        window.location.href = destination;
                    }, 1500);
                    
                } else {
                    throw new Error(data.error || 'Login failed');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
                
                // Reset button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in to Dashboard';
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
                const dest = storedUser.userType === 'admin' ? '/admin-dashboard' : '/cpa-dashboard';
                // Verify token is still valid and redirect if so
                fetch('https://canadaaccountants-backend-production-1d8f.up.railway.app/api/auth/verify', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = dest;
                    }
                })
                .catch(() => {
                    // Token invalid, remove it
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                });
            }
        });
    </script>
</body>
</html>
